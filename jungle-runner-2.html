<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Jungle Rush</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Boogaloo&family=Nunito:wght@400;700;900&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0d1f0a;
    display: flex; align-items: center; justify-content: center;
    height: 100vh; font-family: 'Nunito', sans-serif;
    overflow: hidden; touch-action: none;
  }
  #gameWrapper {
    position: relative; width: 480px; height: 720px;
    overflow: hidden; border-radius: 24px;
    box-shadow: 0 0 80px #1a4a0a88, 0 0 200px #0d2f0533;
  }
  canvas { display: block; width: 100%; height: 100%; }
  #ui {
    position: absolute; top: 0; left: 0; right: 0;
    padding: 18px 24px; display: flex;
    justify-content: space-between; align-items: flex-start;
    pointer-events: none; z-index: 10;
  }
  .score-box {
    background: rgba(0,0,0,0.45); border: 2px solid rgba(100,255,80,0.3);
    border-radius: 14px; padding: 8px 18px; backdrop-filter: blur(6px);
  }
  .score-label { font-size: 10px; color: #7dff60; letter-spacing: 2px; text-transform: uppercase; }
  .score-value { font-family: 'Boogaloo', cursive; font-size: 28px; color: #fff; line-height: 1; }
  #overlay {
    position: absolute; inset: 0; display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    background: rgba(5,18,3,0.88); backdrop-filter: blur(4px);
    z-index: 20; transition: opacity 0.4s;
  }
  #overlay.hidden { opacity: 0; pointer-events: none; }
  .game-title {
    font-family: 'Boogaloo', cursive; font-size: 62px; color: #7dff60;
    text-shadow: 0 0 30px #4dcc2088, 4px 4px 0 #1a5a0a;
    letter-spacing: 2px; margin-bottom: 4px;
  }
  .game-sub {
    font-size: 14px; color: #a8e89a; letter-spacing: 4px;
    text-transform: uppercase; margin-bottom: 40px; opacity: 0.8;
  }
  .dino-emoji { font-size: 72px; margin-bottom: 20px; animation: bounce 1s ease-in-out infinite; }
  @keyframes bounce { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-14px)} }
  .play-btn {
    background: linear-gradient(135deg,#4dcc20,#2a8a0a); border: none;
    border-radius: 50px; padding: 16px 52px; font-family: 'Boogaloo', cursive;
    font-size: 28px; color: #fff; cursor: pointer; letter-spacing: 1px;
    box-shadow: 0 8px 30px #2a8a0a66, 0 2px 0 #1a5a0a;
    transition: transform 0.1s, box-shadow 0.1s; pointer-events: all; margin-bottom: 16px;
  }
  .play-btn:active { transform: translateY(2px); box-shadow: 0 4px 15px #2a8a0a66; }
  .hint { font-size: 13px; color: #7dff6088; letter-spacing: 2px; }
  #deathScreen {
    position: absolute; inset: 0; display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    background: rgba(5,18,3,0.92); backdrop-filter: blur(6px);
    z-index: 20; opacity: 0; pointer-events: none; transition: opacity 0.4s;
  }
  #deathScreen.show { opacity: 1; pointer-events: all; }
  .death-title {
    font-family: 'Boogaloo', cursive; font-size: 48px; color: #ff5a3a;
    text-shadow: 0 0 20px #ff5a3a88, 3px 3px 0 #7a1a00; margin-bottom: 8px;
  }
  .final-score { font-family: 'Boogaloo', cursive; font-size: 22px; color: #fff; margin-bottom: 6px; }
  .best-score { font-size: 14px; color: #7dff60; margin-bottom: 36px; letter-spacing: 2px; }
  #jumpBtn {
    position: absolute; bottom: 0; left: 0; right: 0; height: 50%;
    z-index: 5; background: transparent; border: none; cursor: pointer;
    -webkit-tap-highlight-color: transparent;
  }
</style>
</head>
<body>
<div id="gameWrapper">
  <canvas id="c" width="480" height="720"></canvas>
  <div id="ui">
    <div class="score-box">
      <div class="score-label">Score</div>
      <div class="score-value" id="scoreDisplay">0</div>
    </div>
    <div class="score-box">
      <div class="score-label">Best</div>
      <div class="score-value" id="bestDisplay">0</div>
    </div>
  </div>
  <div id="overlay">
    <div class="dino-emoji">🦎</div>
    <div class="game-title">JUNGLE RUSH</div>
    <div class="game-sub">Endless Runner</div>
    <button class="play-btn" id="startBtn">▶ PLAY</button>
    <div class="hint">TAP / SPACE / CLICK to jump &nbsp;|&nbsp; Double jump!</div>
  </div>
  <div id="deathScreen">
    <div style="font-size:56px;margin-bottom:12px;">💀</div>
    <div class="death-title">GAME OVER</div>
    <div class="final-score" id="finalScore">Score: 0</div>
    <div class="best-score" id="finalBest">Best: 0</div>
    <button class="play-btn" id="restartBtn">↺ RETRY</button>
  </div>
  <button id="jumpBtn" aria-label="Jump"></button>
</div>

<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const W = 480, H = 720;
const GROUND_Y = H - 130;

let state = 'menu';
let score = 0, best = 0, frame = 0, speed = 4;

const player = {
  x: 80, y: GROUND_Y, w: 48, h: 52,
  vy: 0, onGround: true, jumpCount: 0, dead: false
};
const GRAVITY = 0.6, JUMP_F = -15;

const bgLayers = [
  { items: [], spd: 0.3, baseY: 100, col: '#1a4a08' },
  { items: [], spd: 0.6, baseY: 180, col: '#256010' },
  { items: [], spd: 1.0, baseY: 250, col: '#2d7a14' },
];

let obstacles = [], coins = [], particles = [];
let obstacleTimer = 100, coinTimer = 60;
let groundX = 0;

function initBg() {
  bgLayers.forEach(l => {
    l.items = [];
    for (let x = 0; x < W + 300; x += 70 + Math.random() * 60) {
      l.items.push({ x, h: 80 + Math.random() * 100 });
    }
  });
}

function resetGame() {
  score = 0; frame = 0; speed = 4;
  player.y = GROUND_Y; player.vy = 0;
  player.onGround = true; player.jumpCount = 0; player.dead = false;
  obstacles = []; coins = []; particles = [];
  obstacleTimer = 100; coinTimer = 60; groundX = 0;
  initBg();
}

function doJump() {
  if (state !== 'playing') return;
  if (player.jumpCount < 2) {
    player.vy = JUMP_F - player.jumpCount * 1.5;
    player.onGround = false;
    player.jumpCount++;
    for (let i = 0; i < 8; i++) {
      particles.push({
        x: player.x + player.w/2 + (Math.random()-0.5)*20,
        y: player.y + player.h,
        vx: (Math.random()-0.5)*4, vy: Math.random()*-3+1,
        life: 1, size: 3+Math.random()*5, col: Math.random()>0.5?'#2d8a12':'#4daa20'
      });
    }
  }
}

function spawnObstacle() {
  const types = [
    { w:36, h:52, type:'log' },
    { w:46, h:40, type:'rock' },
    { w:28, h:58, type:'bamboo' },
  ];
  const t = types[Math.floor(Math.random()*types.length)];
  obstacles.push({ x: W+50, y: GROUND_Y+52-t.h, w: t.w, h: t.h, type: t.type });
}

function spawnCoins() {
  const x = W + 50;
  const ys = [GROUND_Y-10, GROUND_Y-70, GROUND_Y-130];
  const y = ys[Math.floor(Math.random()*ys.length)];
  const count = 1 + Math.floor(Math.random()*3);
  for (let i = 0; i < count; i++) {
    coins.push({ x: x + i*44, y, r:12, anim: Math.random()*Math.PI*2 });
  }
}

function drawRR(x,y,w,h,r,col) {
  ctx.fillStyle = col;
  ctx.beginPath();
  ctx.roundRect(x,y,w,h,r);
  ctx.fill();
}

function drawTree(x, y, w, h, col) {
  ctx.fillStyle = '#3a1a00';
  ctx.fillRect(x+w*0.38, y+h*0.55, w*0.24, h*0.45);
  ctx.fillStyle = col;
  ctx.beginPath(); ctx.ellipse(x+w/2, y+h*0.5, w*0.5, h*0.38, 0, 0, Math.PI*2); ctx.fill();
  const lighter = col.replace(/[0-9a-f]{2}$/i, 'cc');
  ctx.fillStyle = col;
  ctx.beginPath(); ctx.ellipse(x+w*0.42, y+h*0.28, w*0.38, h*0.28, 0, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.ellipse(x+w*0.62, y+h*0.22, w*0.32, h*0.25, 0, 0, Math.PI*2); ctx.fill();
}

function drawObstacle(o) {
  if (o.type === 'log') {
    drawRR(o.x, o.y, o.w, o.h, 5, '#4a2000');
    drawRR(o.x+3, o.y+3, o.w-6, o.h-6, 4, '#8b4513');
    ctx.strokeStyle = '#4a2000'; ctx.lineWidth = 1.5;
    ctx.beginPath(); ctx.ellipse(o.x+o.w/2, o.y+8, o.w/2-6, 5, 0, 0, Math.PI*2); ctx.stroke();
  } else if (o.type === 'rock') {
    ctx.fillStyle = '#444';
    ctx.beginPath(); ctx.ellipse(o.x+o.w/2, o.y+o.h/2+4, o.w/2, o.h/2, 0, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = '#888';
    ctx.beginPath(); ctx.ellipse(o.x+o.w/2, o.y+o.h/2, o.w/2, o.h/2, 0, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = 'rgba(255,255,255,0.18)';
    ctx.beginPath(); ctx.ellipse(o.x+o.w*0.33, o.y+o.h*0.3, o.w*0.18, o.h*0.14, -0.5, 0, Math.PI*2); ctx.fill();
  } else {
    ctx.fillStyle = '#1a5a08';
    ctx.fillRect(o.x+5, o.y, o.w-10, o.h);
    ctx.fillStyle = '#2d8a12';
    ctx.fillRect(o.x+7, o.y, o.w-14, o.h);
    for (let i=0;i<4;i++) {
      ctx.fillStyle='rgba(0,0,0,0.2)';
      ctx.fillRect(o.x+7, o.y+(o.h/4)*i+2, o.w-14, 4);
    }
    ctx.fillStyle='#2d8a12';
    ctx.beginPath();
    ctx.moveTo(o.x+4,o.y); ctx.lineTo(o.x+o.w/2,o.y-22); ctx.lineTo(o.x+o.w-4,o.y);
    ctx.fill();
  }
}

function drawCoin(c) {
  const bob = Math.sin(c.anim + frame*0.08)*4;
  const cx=c.x, cy=c.y+bob;
  const g = ctx.createRadialGradient(cx,cy,0,cx,cy,c.r*2.5);
  g.addColorStop(0,'rgba(255,220,0,0.35)'); g.addColorStop(1,'rgba(255,220,0,0)');
  ctx.fillStyle=g; ctx.beginPath(); ctx.arc(cx,cy,c.r*2.5,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='#b8860b'; ctx.beginPath(); ctx.arc(cx,cy+2,c.r,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='#ffe066'; ctx.beginPath(); ctx.arc(cx,cy,c.r,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='rgba(255,255,255,0.4)';
  ctx.beginPath(); ctx.arc(cx-3,cy-3,c.r*0.35,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='#b8860b'; ctx.font=`bold ${c.r}px Nunito`;
  ctx.textAlign='center'; ctx.textBaseline='middle';
  ctx.fillText('$',cx,cy+1);
}

function drawPlayer() {
  const px=player.x, py=player.y, pw=player.w, ph=player.h;
  // shadow
  ctx.fillStyle='rgba(0,0,0,0.2)';
  ctx.beginPath(); ctx.ellipse(px+pw/2,GROUND_Y+ph+2,pw*0.38,5,0,0,Math.PI*2); ctx.fill();
  // body
  drawRR(px+4, py+8, pw-8, ph-14, 10, '#1a6008');
  drawRR(px+6, py+6, pw-12, ph-18, 9, '#7dff60');
  // stripes
  ctx.fillStyle='rgba(0,100,0,0.25)';
  for(let s=0;s<3;s++) ctx.fillRect(px+10+s*10, py+10, 5, ph-26);
  // eye
  ctx.fillStyle='#fff';
  ctx.beginPath(); ctx.ellipse(px+pw-13,py+16,7,8,0,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='#1a4a00';
  ctx.beginPath(); ctx.ellipse(px+pw-11,py+17,4,5,0,0,Math.PI*2); ctx.fill();
  // pupil shine
  ctx.fillStyle='#fff';
  ctx.beginPath(); ctx.arc(px+pw-13,py+14,2,0,Math.PI*2); ctx.fill();
  // legs
  const legOff = player.onGround ? Math.sin(frame*0.25)*7 : 0;
  ctx.fillStyle='#1a6008';
  ctx.fillRect(px+8, py+ph-12, 12, 12+legOff);
  ctx.fillRect(px+pw-20, py+ph-12, 12, 12-legOff);
  // feet
  ctx.fillStyle='#0d4004';
  ctx.fillRect(px+6, py+ph-2+legOff, 16, 6);
  ctx.fillRect(px+pw-22, py+ph-2-legOff, 16, 6);
  // tail
  ctx.strokeStyle='#1a6008'; ctx.lineWidth=6; ctx.lineCap='round';
  ctx.beginPath();
  ctx.moveTo(px+6,py+ph-20);
  ctx.quadraticCurveTo(px-18,py+ph-8,px-10,py+ph-34);
  ctx.stroke();
  // dead eyes
  if (player.dead) {
    ctx.strokeStyle='#ff3030'; ctx.lineWidth=3;
    const ex=px+pw-13, ey=py+16;
    ctx.beginPath(); ctx.moveTo(ex-6,ey-6); ctx.lineTo(ex+6,ey+6); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(ex+6,ey-6); ctx.lineTo(ex-6,ey+6); ctx.stroke();
  }
}

function collides(a, b) {
  const m=10;
  return a.x+m<b.x+b.w-m && a.x+a.w-m>b.x+m && a.y+m<b.y+b.h && a.y+a.h>b.y+m;
}

function update() {
  if (state !== 'playing') return;
  frame++;
  speed = 4 + score / 250;
  score += speed * 0.05;

  // physics
  player.vy += GRAVITY;
  player.y += player.vy;
  if (player.y >= GROUND_Y) {
    player.y = GROUND_Y; player.vy = 0;
    player.onGround = true; player.jumpCount = 0;
  } else { player.onGround = false; }

  // bg scroll
  bgLayers.forEach(l => {
    l.items.forEach(it => it.x -= speed * l.spd);
    if (l.items[0].x < -200) {
      const last = l.items[l.items.length-1].x;
      l.items.shift();
      l.items.push({ x: last + 70 + Math.random()*60, h: 80+Math.random()*100 });
    }
  });

  groundX = (groundX - speed) % 48;

  // obstacles
  obstacleTimer--;
  if (obstacleTimer <= 0) {
    spawnObstacle();
    obstacleTimer = 55 + Math.random()*75 - Math.min(score/120, 35);
  }
  obstacles = obstacles.filter(o => o.x > -80);
  obstacles.forEach(o => {
    o.x -= speed;
    if (!player.dead && collides(player, o)) {
      player.dead = true;
      setTimeout(showDeath, 600);
    }
  });

  // coins
  coinTimer--;
  if (coinTimer <= 0) { spawnCoins(); coinTimer = 80+Math.random()*60; }
  coins = coins.filter(c => !c._del && c.x > -40);
  coins.forEach(c => {
    c.x -= speed;
    if (!player.dead &&
        player.x < c.x+c.r && player.x+player.w > c.x-c.r &&
        player.y < c.y+c.r && player.y+player.h > c.y-c.r) {
      c._del = true; score += 10;
      for (let i=0;i<10;i++) {
        const a=(Math.PI*2*i)/10;
        particles.push({x:c.x,y:c.y,vx:Math.cos(a)*4,vy:Math.sin(a)*4,life:1,size:4+Math.random()*4,col:'#ffe066'});
      }
    }
  });

  // particles
  particles.forEach(p => { p.x+=p.vx; p.y+=p.vy; p.vy+=0.15; p.life-=0.03; });
  particles = particles.filter(p => p.life > 0);

  document.getElementById('scoreDisplay').textContent = Math.floor(score);
  if (score > best) best = score;
  document.getElementById('bestDisplay').textContent = Math.floor(best);
}

function showDeath() {
  state = 'dead';
  document.getElementById('finalScore').textContent = 'Score: '+Math.floor(score);
  document.getElementById('finalBest').textContent = 'Best: '+Math.floor(best);
  document.getElementById('deathScreen').classList.add('show');
}

function draw() {
  // sky
  const sky = ctx.createLinearGradient(0,0,0,H*0.7);
  sky.addColorStop(0,'#0a1a04'); sky.addColorStop(1,'#1a4a0a');
  ctx.fillStyle=sky; ctx.fillRect(0,0,W,H);

  // moon glow
  const mg=ctx.createRadialGradient(W-70,70,10,W-70,70,60);
  mg.addColorStop(0,'rgba(255,230,120,0.6)'); mg.addColorStop(1,'rgba(255,230,120,0)');
  ctx.fillStyle=mg; ctx.beginPath(); ctx.arc(W-70,70,60,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='rgba(255,230,120,0.55)';
  ctx.beginPath(); ctx.arc(W-70,70,26,0,Math.PI*2); ctx.fill();

  // stars
  [[22,28],[88,50],[155,18],[248,42],[338,14],[415,55],[65,95],[308,75],[190,60],[420,30]].forEach(([sx,sy]) => {
    const twinkle = 0.4+0.6*Math.abs(Math.sin(frame*0.02+sx));
    ctx.globalAlpha=twinkle;
    ctx.fillStyle='#fff'; ctx.fillRect(sx,sy,2,2);
  });
  ctx.globalAlpha=1;

  // bg trees
  bgLayers.forEach(l => {
    l.items.forEach(it => drawTree(it.x, l.baseY, 50+l.spd*30, it.h, l.col));
  });

  // ground
  const gfill=ctx.createLinearGradient(0,GROUND_Y+52,0,H);
  gfill.addColorStop(0,'#2d1a08'); gfill.addColorStop(1,'#120a02');
  ctx.fillStyle=gfill; ctx.fillRect(0,GROUND_Y+52,W,H);

  // dirt pattern
  ctx.fillStyle='rgba(255,255,255,0.04)';
  for(let dx=groundX;dx<W+48;dx+=48) {
    for(let dy=GROUND_Y+60;dy<H;dy+=24) ctx.fillRect(dx+(dy%48),dy,8,4);
  }

  // grass
  ctx.fillStyle='#256010'; ctx.fillRect(0,GROUND_Y+50,W,12);
  ctx.fillStyle='#2d8a12'; ctx.fillRect(0,GROUND_Y+48,W,8);

  // grass tufts
  for(let gx=groundX;gx<W+48;gx+=36) {
    ctx.fillStyle='#3aaa18';
    for(let t=0;t<3;t++) {
      ctx.beginPath();
      ctx.moveTo(gx+t*10, GROUND_Y+48);
      ctx.lineTo(gx+t*10+5, GROUND_Y+36);
      ctx.lineTo(gx+t*10+10, GROUND_Y+48);
      ctx.fill();
    }
  }

  // coins, obstacles, player
  coins.forEach(c => !c._del && drawCoin(c));
  obstacles.forEach(o => drawObstacle(o));
  drawPlayer();

  // particles
  particles.forEach(p => {
    ctx.globalAlpha=p.life;
    ctx.fillStyle=p.col;
    ctx.beginPath(); ctx.arc(p.x,p.y,p.size,0,Math.PI*2); ctx.fill();
  });
  ctx.globalAlpha=1;

  // vignette
  const vig=ctx.createRadialGradient(W/2,H/2,H*0.3,W/2,H/2,H*0.9);
  vig.addColorStop(0,'rgba(0,0,0,0)'); vig.addColorStop(1,'rgba(0,10,0,0.6)');
  ctx.fillStyle=vig; ctx.fillRect(0,0,W,H);

  // speed lines when fast
  if (speed > 7) {
    ctx.strokeStyle=`rgba(125,255,96,${(speed-7)*0.012})`;
    ctx.lineWidth=1;
    for(let i=0;i<8;i++) {
      const lx=((frame*speed*0.4)+i*60)%W;
      const ly=100+Math.random()*500;
      ctx.beginPath(); ctx.moveTo(lx,ly); ctx.lineTo(lx-40,ly); ctx.stroke();
    }
  }
}

function loop() { update(); draw(); requestAnimationFrame(loop); }

// controls
document.addEventListener('keydown', e => {
  if (e.code==='Space'||e.code==='ArrowUp') { e.preventDefault(); doJump(); }
});
document.getElementById('jumpBtn').addEventListener('click', doJump);
canvas.addEventListener('click', doJump);

document.getElementById('startBtn').addEventListener('click', () => {
  resetGame(); state='playing';
  document.getElementById('overlay').classList.add('hidden');
});
document.getElementById('restartBtn').addEventListener('click', () => {
  document.getElementById('deathScreen').classList.remove('show');
  resetGame(); state='playing';
});

initBg();
loop();
</script>
</body>
</html>
